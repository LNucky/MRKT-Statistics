services:
  scraper:
    build: .
    image: mrkt-hz:latest
    env_file:
      - .env
    environment:
      OUTPUT_DIR: /data
      MRKT_LOG_LISTINGS: "0"
      MRKT_CHECKPOINT_PAGES: "100"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    volumes:
      - ./data:/data

  parser:
    build: .
    image: mrkt-hz:latest
    profiles:
      - analytics
    environment:
      OUTPUT_DIR: /data
    volumes:
      - ./data:/data
    command: ["parser.py"]
