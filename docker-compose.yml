x-app-build: &app-build
  context: .
  args:
    APP_UID: ${APP_UID:-1000}
    APP_GID: ${APP_GID:-1000}

services:
  scraper:
    build: *app-build
    image: mrkt-hz:latest
    env_file:
      - .env
    environment:
      OUTPUT_DIR: /data
      MRKT_LOG_LISTINGS: "0"
      MRKT_CHECKPOINT_PAGES: "100"
      MRKT_AUTH_REFRESH_PAGES: "1000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    volumes:
      - ./data:/data

  parser:
    build: *app-build
    image: mrkt-hz:latest
    profiles:
      - analytics
    environment:
      OUTPUT_DIR: /data
    volumes:
      - ./data:/data
    command: ["parser.py"]
